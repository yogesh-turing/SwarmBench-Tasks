coordination_pattern: fan-out-synthesize

sub_tasks:
  - id: partners-routing-and-app-router
    description: >
      Own the routing migration and page wiring surfaces for partner pages.
      Scope:
      /testbed/apps/www/app/layout.tsx
      /testbed/apps/www/app/partners/page.tsx
      /testbed/apps/www/app/partners/PartnersContent.tsx
      /testbed/apps/www/app/partners/integrations/page.tsx
      /testbed/apps/www/app/partners/integrations/IntegrationsContent.tsx
      /testbed/apps/www/pages/_app.tsx
      /testbed/apps/www/pages/partners/index.tsx
      /testbed/apps/www/pages/partners/integrations/index.tsx
      Ensure /partners and /partners/integrations are App Router-first, and legacy pages-router links/entrypoints do not break expected navigation behavior.
    depends_on: []
    parallel_group: build

  - id: partner-intake-ui-and-cta
    description: >
      Own partner intake user-facing integration and CTA behavior.
      Scope:
      /testbed/apps/www/components/Partners/BecomeAPartner.tsx
      /testbed/apps/www/components/Partners/PartnerIntakeForm.tsx
      /testbed/apps/www/data/partners/index.tsx
      Implement inline intake form at #become-a-partner, ensure CTA links anchor correctly,
      and support partner-type driven conditional section visibility in the UI.
    depends_on: []
    parallel_group: build

  - id: marketing-form-engine-and-showwhen
    description: >
      Own shared form engine semantics and field rendering consistency.
      Scope:
      /testbed/packages/marketing/index.ts
      /testbed/packages/marketing/src/forms/index.ts
      /testbed/packages/marketing/src/forms/MarketingForm.tsx
      /testbed/packages/marketing/src/forms/HubSpotFormEmbed.tsx
      /testbed/packages/marketing/src/go/schemas.ts
      /testbed/packages/marketing/src/go/sections/FormSection.tsx
      /testbed/packages/marketing/src/go/showWhen.ts
      Keep showWhen semantics centralized and consistent across schema + renderer,
      including checkbox-group behavior for solutions-style multi-select questions.
    depends_on: []
    parallel_group: build

  - id: submission-fanout-and-provider-gating
    description: >
      Own submission fan-out logic and provider-specific delivery rules.
      Scope:
      /testbed/packages/marketing/src/go/actions/submitForm.ts
      /testbed/packages/marketing/src/go/showWhen.ts
      Note: PartnerIntakeForm.tsx is owned exclusively by partner-intake-ui-and-cta.
      Implement sendWhen-style provider gating so all qualifying submissions still reach HubSpot,
      while Notion receives only intended partner categories.
      Preserve non-qualifying behavior (no accidental Notion fan-out).
    depends_on: []
    parallel_group: build

  - id: secondary-docs-design-system-and-studio-audit
    description: >
      Own secondary breadth surfaces that must remain integration-consistent while
      partner routing/intake/form changes land.
      Scope:
      /testbed/apps/docs/app/layout.tsx
      /testbed/apps/docs/components/Breadcrumbs.tsx
      /testbed/apps/docs/lib/breadcrumbs.ts
      /testbed/apps/docs/lib/json-ld.ts
      /testbed/apps/docs/styles/globals.css
      /testbed/apps/docs/tailwind.config.cjs
      /testbed/apps/design-system/styles/globals.css
      /testbed/apps/design-system/tailwind.config.js
      /testbed/apps/studio/components/interfaces/Docs/Description.tsx
      /testbed/apps/studio/components/interfaces/ProjectAPIDocs/Content/Introduction.tsx
      /testbed/apps/studio/components/layouts/AppLayout/NoticeBanner.tsx
      /testbed/apps/studio/components/interfaces/DatabaseNavShortcuts.tsx
      Audit and reconcile side effects (layout exports, shared styling assumptions,
      docs navigation/meta wiring, and cross-app UI consistency) without broad refactors.
    depends_on: []
    parallel_group: build

  - id: cross-surface-reconciliation
    description: >
      Reconcile outputs from all five workstreams.
      Validate consistency across routing, CTA anchors, inline form rendering,
      shared showWhen semantics, provider fan-out rules, and secondary docs/design-system/studio surfaces.
      Apply minimal integration fixes only where cross-surface behavior diverges.
    depends_on:
      - partners-routing-and-app-router
      - partner-intake-ui-and-cta
      - marketing-form-engine-and-showwhen
      - submission-fanout-and-provider-gating
      - secondary-docs-design-system-and-studio-audit
    parallel_group: synthesize

  - id: verifier-driven-stabilization
    description: >
      Run verifier, triage failures, and stabilize until green.
      Priority order:
      1) routing + anchors,
      2) conditional rendering and field-type support,
      3) shared showWhen semantics,
      4) provider fan-out gating.
      Avoid broad refactors after synthesis; prefer targeted reconciliations.
    depends_on:
      - cross-surface-reconciliation
    parallel_group: synthesize
