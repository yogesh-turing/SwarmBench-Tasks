coordination_pattern: fan-out-synthesize

sub_tasks:
  - id: fix-auth-session-time-units
    description: >
      Own only these files:
      /testbed/apps/studio/components/interfaces/Auth/ProtectionAuthSettingsForm/ProtectionAuthSettingsForm.tsx
      and
      /testbed/apps/studio/components/interfaces/Auth/SessionsAuthSettingsForm/SessionsAuthSettingsForm.tsx.
      Implement Bug 1 by showing session timeout values in human-readable units in the UI,
      while preserving backend contract values in seconds on submit.
      Keep reset/default and submit behavior consistent across both forms.
    depends_on: []
    parallel_group: fix

  - id: fix-vercel-github-status-auth-and-resilience
    description: >
      Own only /testbed/scripts/authorizeVercelDeploys.ts.
      Implement Bug 2 and Bug 4 in one cohesive edit:
      authenticate GitHub status requests using GITHUB_TOKEN, add timeout protection,
      add bounded retries for transient 429/5xx failures, and keep non-retriable
      failure behavior explicit and safe. Skip statuses missing target_url.
    depends_on: []
    parallel_group: fix

  - id: fix-magnified-products-vector-link-and-label
    description: >
      Own only /testbed/apps/www/components/MagnifiedProducts.tsx.
      Implement Bug 3 and Bug 5 together:
      fix the Vector product URL to the valid modules route and set a non-empty
      visible label while keeping existing product intent and metadata fields intact.
    depends_on: []
    parallel_group: fix

  - id: add-design-system-color-palette-with-accessibility
    description: >
      Own only these files:
      /testbed/apps/design-system/components/color-palette.tsx,
      /testbed/apps/design-system/components/mdx-components.tsx,
      /testbed/apps/design-system/content/docs/color-usage.mdx.
      Implement Feature 1 and Feature 2 together:
      add the ColorPalette docs component, register it in MDX component mapping,
      render it in docs, and include accessibility labels plus copy-feedback guidance.
      Keep implementation lightweight and consistent with existing design-system style.
    depends_on: []
    parallel_group: fix

  - id: verify-and-stabilize
    description: >
      After all fix tasks finish, run the verifier and confirm all checks pass.
      If a check fails, apply minimal integration fixes (not broad refactors) and
      rerun until green. Resolve failures in this priority order:
      1) auth conversion semantics, 2) GitHub auth/timeout/retry behavior,
      3) docs + color palette integration, 4) vector card metadata.
      Keep ownership boundaries from earlier tasks unless a failing test requires
      final integration edits.
    depends_on:
      - fix-auth-session-time-units
      - fix-vercel-github-status-auth-and-resilience
      - fix-magnified-products-vector-link-and-label
      - add-design-system-color-palette-with-accessibility
    parallel_group: synthesize
