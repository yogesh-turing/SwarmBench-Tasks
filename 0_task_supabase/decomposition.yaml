coordination_pattern: fan-out-synthesize

sub_tasks:
  - id: fix-auth-session-time-units
    description: >
      Own only these files:
      /testbed/apps/studio/components/interfaces/Auth/ProtectionAuthSettingsForm/ProtectionAuthSettingsForm.tsx
      and
      /testbed/apps/studio/components/interfaces/Auth/SessionsAuthSettingsForm/SessionsAuthSettingsForm.tsx.
      Fix the sessions timeout/timebox UX so values shown in forms are human-readable
      hours while payloads sent to backend remain in seconds. Keep behavior consistent
      across reset/default state and submit path. Do not modify other files.
    depends_on: []
    parallel_group: fix

  - id: fix-vercel-github-status-auth
    description: >
      Own only /testbed/scripts/authorizeVercelDeploys.ts.
      Ensure GitHub statuses API calls support authenticated requests via GITHUB_TOKEN,
      while preserving existing status-fetch and failure behavior. Keep the change
      focused to request configuration and related error-safe handling in this script.
      Do not modify other files.
    depends_on: []
    parallel_group: fix

  - id: fix-magnified-products-vector-link
    description: >
      Own only /testbed/apps/www/components/MagnifiedProducts.tsx.
      Fix the Vector product URL so it points to the valid modules route.
      Keep all other product metadata unchanged.
    depends_on: []
    parallel_group: fix

  - id: add-design-system-color-palette
    description: >
      Own only these files:
      /testbed/apps/design-system/components/color-palette.tsx,
      /testbed/apps/design-system/components/mdx-components.tsx,
      /testbed/apps/design-system/content/docs/color-usage.mdx.
      Add a ColorPalette docs component and wire it into MDX component mapping and
      color usage docs so it can be rendered from documentation pages.
      Keep implementation lightweight and consistent with existing design-system style.
    depends_on: []
    parallel_group: fix

  - id: verify-and-stabilize
    description: >
      After all fix tasks finish, run the verifier and confirm all checks pass.
      If a check fails, apply minimal integration fixes (not broad refactors) and
      rerun until green.
    depends_on:
      - fix-auth-session-time-units
      - fix-vercel-github-status-auth
      - fix-magnified-products-vector-link
      - add-design-system-color-palette
    parallel_group: synthesize
